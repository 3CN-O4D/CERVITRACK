<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CerviTrack - Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1E1A4B 0%, #2D2B6E 50%, #6C5CE7 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-icon i { font-size: 32px; color: #fff; }
        .login-title {
            font-size: 22px;
            font-weight: 800;
            color: #1a1a2e;
            text-align: center;
            letter-spacing: -0.3px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #6c757d;
            text-align: center;
            margin-bottom: 28px;
        }
        .login-card .form-label {
            font-size: 12px;
            font-weight: 700;
            color: #495057;
            margin-bottom: 4px;
        }
        .login-card .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            border: 2px solid #e9ecef;
            transition: border-color 0.2s;
        }
        .login-card .form-control:focus {
            border-color: #6C5CE7;
            box-shadow: 0 0 0 3px rgba(108,92,231,0.1);
        }
        .login-card .btn-primary {
            background: linear-gradient(135deg, #6C5CE7, #5A4BD1);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            font-size: 15px;
        }
        .login-card .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108,92,231,0.35);
        }
        .login-error {
            background: #fff0f0;
            color: #dc3545;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid #ffd4d4;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-3">
            <img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="CerviTrack" style="height:72px;border-radius:16px;">
        </div>
        <div class="login-title">CerviTrack</div>
        <div class="login-subtitle">Admin Portal — Sign in to continue</div>

        {% if error %}
        <div class="login-error">
            <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="admin@cervitrack.com" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
        <div class="login-footer">CerviTrack v1.0 &middot; Secure Admin Access</div>
    </div>
</body>
</html>
